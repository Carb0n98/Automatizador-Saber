<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AutoVerifica</title>
  <meta name="description" content="Acesse o painel de automação de verificações"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080910; --surface: #101118; --surface-2: #181921;
      --border: rgba(255,255,255,0.07); --border-h: rgba(255,255,255,0.14);
      --primary: #7c3aed; --accent: #4f46e5; --primary-l: #a78bfa;
      --danger: #ef4444; --text: #e2e8f0; --text-m: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      animation: float1 8s ease-in-out infinite;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(79,70,229,0.10) 0%, transparent 70%);
      animation: float2 10s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.4);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 32px rgba(124,58,237,0.4); }
      50% { box-shadow: 0 8px 48px rgba(124,58,237,0.65); }
    }

    .login-logo h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e2e8f0, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-logo p {
      font-size: 13.5px;
      color: var(--text-m);
      margin-top: 4px;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
    }

    .login-card h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-card p { font-size: 13px; color: var(--text-m); margin-bottom: 28px; }

    /* Flash */
    .alert {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13.5px;
      font-weight: 500;
    }
    .alert-danger { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

    /* Form */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-m);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-m);
      font-size: 14px;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 11px 14px 11px 40px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-m);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,0.55); }
    .btn-login:active { transform: translateY(0); }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-m);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon"><i class="bi bi-shield-check"></i></div>
      <h1>AutoVerifica</h1>
      <p>Sistema de Automação SABER</p>
    </div>

    <div class="login-card">
      <h2>Bem-vindo de volta</h2>
      <p>Insira suas credenciais para acessar o painel.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">
            <i class="bi bi-exclamation-circle"></i> {{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label for="username">Usuário</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" id="username" name="username"
                   placeholder="Digite seu usuário" required autocomplete="username"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" name="password"
                   placeholder="Digite sua senha" required autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i>
          Entrar no Painel
        </button>
      </form>
    </div>

    <div class="login-footer">
      &copy; 2025 AutoVerifica &mdash; Sistema de Automação
    </div>
  </div>

  <script>
    document.getElementById('togglePw').addEventListener('click', function() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    document.querySelector('form').addEventListener('submit', function() {
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></span> Entrando...';
      btn.disabled = true;
    });
  </script>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
