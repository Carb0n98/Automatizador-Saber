services:
  autoverifica:
    build: .
    container_name: autoverifica
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # SQLite database persists outside container
      # Monta sobre /app/instance para ter permissão correta
      - autoverifica_data:/app/instance
    environment:
      # ── Configure no painel do Dokploy (Environment), NÃO aqui! ──
      SECRET_KEY: ""
      # Caminho do banco dentro do container (volume montado em /app/instance)
      DATABASE_URL: "sqlite:////app/instance/verificacoes.db"
      CHROME_BIN: "/usr/bin/chromium"
      CHROMEDRIVER_BIN: "/usr/bin/chromedriver"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  autoverifica_data:
    driver: local
