services:
  autoverifica:
    build: .
    container_name: autoverifica
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # SQLite database persists outside container
      - autoverifica_data:/data
    environment:
      # ── Obrigatório: configure no painel do Dokploy (Environment), NÃO aqui! ──
      SECRET_KEY: ""
      DATABASE_URL: "sqlite:////data/verificacoes.db"
      # ── Opcional: pode configurar também pelo painel web ──
      # SABER_URL: "https://adtalento.com/websiteSaber"
      # SABER_USUARIO: ""
      # SABER_SENHA: ""
      # RESTAURANTE: "NPN"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  autoverifica_data:
    driver: local
