services:
  autoverifica:
    build: .
    container_name: autoverifica
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - autoverifica_data:/app/instance
    environment:
      SECRET_KEY: ""
      DATABASE_URL: "sqlite:////app/instance/verificacoes.db"
      CHROME_BIN: "/usr/bin/chromium"
      CHROMEDRIVER_BIN: "/usr/bin/chromedriver"
      WAHA_BASE_URL: "http://waha:3000"
      WAHA_API_KEY: "autoverifica-waha-key-2024"
    depends_on:
      - waha
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/auth/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── WAHA — WhatsApp HTTP API ──────────────────────────────────────────────
  # Engine NOWEB: sem Chrome, sem banco externo, sessões persistidas em disco.
  # Substitui: evolution-api + evolution-postgres + evolution-redis (3 containers → 1)
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions
    environment:
      # Chave de autenticação usada no header X-Api-Key
      WAHA_API_KEY: "autoverifica-waha-key-2024"
      # Engine NOWEB: não usa Chrome, muito mais estável e leve (~100MB RAM)
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      # Não exibir QR no terminal (gerenciamos via API)
      WAHA_PRINT_QR: "false"
      LOG_LEVEL: "info"
      # Desabilita a autenticação do dashboard (opcional — só acessível internamente)
      WAHA_DASHBOARD_ENABLED: "true"

volumes:
  autoverifica_data:
    driver: local
  waha_sessions:
    driver: local
